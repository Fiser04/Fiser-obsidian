<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script
            src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"
        ></script>
        <script>
            $(document).ready(function () {
                const element = $("<h1>Hello World!</h1>");
                $("#app").append(element);
                $("#toggle").click(function () {
                    $("#app").toggle();
                });
                $("#hide").click(function () {
                    $("#app").hide();
                });
                $("#changeColor").click(function () {
                    $("#app").css("color", "red");
                });
                $("#show").click(function () {
                    const obsah = $("#link").attr("href");
                    $("#app").append("<b>" + obsah + "</b>");
                    // $("#app").prepend("<b>" + obsah + "</b>");
                });
            });
        </script>

        <style>
            #app {
                color: blueviolet;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <button id="toggle">Toggle</button>
        <button type="hide">hide</button>
        <button type="changeColor">Change Color</button>
        <button type="show">show</button>
        <a href="https://www.google.com" id="link">Google</a>
    </body>
</html>
